<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MandStar Chinese — 管理者ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --p900:#1a0835;--p800:#2d1260;--p700:#4c1d95;--p600:#6d28d9;
  --p500:#7c3aed;--p400:#a78bfa;--p300:#c4b5fd;--p200:#ddd6fe;
  --p150:#ede9fe;--p100:#f0ebff;--p50:#faf8ff;
  --ink:#0f0520;--ink2:#3b1f6b;--ink3:#7c6a9e;--ink4:#b8aed4;
  --bg:#faf8ff;--white:#fff;
  --ok:#059669;--okbg:#ecfdf5;--okbdr:#a7f3d0;
  --warn:#d97706;--warnbg:#fffbeb;
  --err:#dc2626;--errbg:#fef2f2;
  --r:8px;--rlg:14px;--rxl:20px;
  --sh:0 1px 4px rgba(76,29,149,.07),0 4px 20px rgba(76,29,149,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 0% 0%,rgba(109,40,217,.07),transparent 55%),
             radial-gradient(ellipse 50% 60% at 100% 100%,rgba(124,58,237,.05),transparent 55%)}

/* ── LOGIN ── */
.login-wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--white);border:1px solid rgba(196,181,253,.3);border-radius:var(--rxl);box-shadow:0 8px 40px rgba(76,29,149,.12);overflow:hidden;width:100%;max-width:400px}
.login-top{background:linear-gradient(135deg,var(--p900),var(--p700));padding:36px 32px;text-align:center}
.login-logo{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--white)}
.login-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--p300)}
.login-body{padding:28px 32px}
.login-label{display:block;font-size:11px;font-weight:500;letter-spacing:.07em;color:var(--ink2);margin-bottom:5px}
.login-input{width:100%;padding:11px 13px;border:1.5px solid var(--p200);border-radius:var(--r);background:var(--p50);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:16px}
.login-input:focus{border-color:var(--p500);box-shadow:0 0 0 3px rgba(124,58,237,.1);background:var(--white)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--p700),var(--p500));color:var(--white);border:none;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-err{font-size:12px;color:var(--err);margin-top:10px;text-align:center;display:none}
.login-err.show{display:block}

/* ── DASHBOARD ── */
.dash{display:none;position:relative;z-index:1}

/* Sidebar */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--p900);padding:0;display:flex;flex-direction:column}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;color:var(--white);margin-bottom:2px}
.sidebar-sub{font-size:11px;color:var(--p400)}
.sidebar-nav{padding:16px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,.06)}
.nav-item.active{color:var(--white);background:rgba(124,58,237,.25);border-left-color:var(--p400)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:var(--p400)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:6px 12px;border-radius:var(--r);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;margin-top:8px;width:100%}
.logout-btn:hover{border-color:rgba(255,255,255,.5);color:var(--white)}

/* Main content */
.main-content{background:var(--bg);overflow-y:auto}
.topbar{background:var(--white);border-bottom:1px solid rgba(196,181,253,.2);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--p800)}
.topbar-meta{font-size:12px;color:var(--ink3)}
.content-area{padding:24px 28px}

/* ── OVERVIEW STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid rgba(196,181,253,.25);border-radius:var(--rlg);padding:18px 20px;box-shadow:var(--sh)}
.stat-label{font-size:11px;color:var(--ink3);font-weight:500;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:700;color:var(--p800)}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.stat-bar{height:3px;border-radius:2px;background:var(--p200);margin-top:10px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--p600),var(--p400))}

/* ── STUDENT LIST ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:700;color:var(--p800)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--p200);border-radius:100px;font-size:12px;color:var(--ink3);background:var(--white);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--p400);color:var(--p600)}
.filter-btn.active{border-color:var(--p500);background:var(--p150);color:var(--p700);font-weight:500}
.search-box{padding:7px 12px;border:1px solid var(--p200);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--white);outline:none;width:200px;font-family:'Noto Sans JP',sans-serif}
.search-box:focus{border-color:var(--p500);box-shadow:0 0 0 2px rgba(124,58,237,.08)}

.student-table{width:100%;background:var(--white);border:1px solid rgba(196,181,253,.2);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh);margin-bottom:24px}
.st-head{display:grid;grid-template-columns:180px 160px 100px 100px 90px 120px 80px;padding:12px 16px;background:var(--p50);border-bottom:1px solid var(--p100);font-size:11px;font-weight:500;color:var(--ink3);letter-spacing:.06em;gap:8px}
.st-row{display:grid;grid-template-columns:180px 160px 100px 100px 90px 120px 80px;padding:13px 16px;border-bottom:1px solid var(--p50);font-size:13px;gap:8px;cursor:pointer;transition:background .15s;align-items:center}
.st-row:last-child{border-bottom:none}
.st-row:hover{background:var(--p50)}
.st-name{font-weight:500;color:var(--ink2)}
.st-email{color:var(--ink3);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.status-new{background:#ede9fe;color:#4c1d95}
.status-contacted{background:#d1fae5;color:#065f46}
.status-scheduled{background:#fef3c7;color:#92400e}
.status-active{background:#dbeafe;color:#1e40af}

/* ── STUDENT DETAIL MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,2,25,.6);backdrop-filter:blur(5px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:var(--rxl);width:100%;max-width:700px;overflow:hidden;box-shadow:0 16px 60px rgba(76,29,149,.2);animation:mup .3s ease}
@keyframes mup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-top{background:linear-gradient(135deg,var(--p900),var(--p700));padding:28px 32px;display:flex;align-items:center;gap:16px}
.modal-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--white);flex-shrink:0}
.modal-name{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--white)}
.modal-email{font-size:12px;color:var(--p300);margin-top:2px}
.modal-close{margin-left:auto;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:var(--white);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:24px 32px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.modal-field{background:var(--p50);border-radius:var(--r);padding:12px 14px}
.modal-field-label{font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--ink3);margin-bottom:4px}
.modal-field-value{font-size:13px;color:var(--ink2);font-weight:500;line-height:1.5}
.modal-field.full{grid-column:1/-1}
.modal-field.full .modal-field-value{font-size:13px;font-weight:400;line-height:1.7}

/* AI Analysis section */
.ai-section{background:linear-gradient(135deg,var(--p100),var(--p50));border:1px solid var(--p200);border-radius:var(--rlg);padding:20px;margin-bottom:20px}
.ai-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--p800);margin-bottom:14px}
.ai-tag{display:inline-flex;align-items:center;gap:5px;background:var(--p600);color:var(--white);border-radius:100px;padding:2px 10px;font-size:10px;font-weight:500}
.ai-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ai-card{background:var(--white);border-radius:var(--r);padding:12px;text-align:center;border:1px solid var(--p200)}
.ai-card-icon{font-size:20px;margin-bottom:6px}
.ai-card-label{font-size:10px;color:var(--ink3);margin-bottom:4px}
.ai-card-val{font-size:13px;font-weight:500;color:var(--p700)}

/* Status select */
.modal-status-row{display:flex;align-items:center;gap:12px;padding-top:16px;border-top:1px solid var(--p100)}
.status-select{padding:8px 12px;border:1px solid var(--p200);border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink);background:var(--white);outline:none;cursor:pointer}
.status-select:focus{border-color:var(--p500)}
.save-status-btn{padding:8px 18px;background:var(--p600);color:var(--white);border:none;border-radius:var(--r);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.save-status-btn:hover{background:var(--p700)}

/* Loading */
.loading-overlay{position:absolute;inset:0;background:rgba(250,248,255,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10}
.sp{width:20px;height:20px;border:2px solid var(--p200);border-top-color:var(--p500);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .st-head,.st-row{grid-template-columns:1fr 1fr 80px 90px}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-top">
      <div class="login-logo">M</div>
      <div class="login-title">管理者ダッシュボード</div>
      <div class="login-sub">MandStar Chinese — 講師専用</div>
    </div>
    <div class="login-body">
      <label class="login-label">パスワード</label>
      <input type="password" class="login-input" id="loginPw" placeholder="パスワードを入力"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">ログイン</button>
      <div class="login-err" id="loginErr">パスワードが正しくありません</div>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="dash" id="dashWrap">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-brand">MandStar Chinese</div>
        <div class="sidebar-sub">管理者ダッシュボード</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" onclick="switchView('overview')"><span class="nav-icon">◈</span>概要</div>
        <div class="nav-item" onclick="switchView('students')"><span class="nav-icon">◉</span>学生一覧</div>
        <div class="nav-item" onclick="switchView('analysis')"><span class="nav-icon">◎</span>分析</div>
      </nav>
      <div class="sidebar-footer">
        <div id="loginInfo">ログイン中</div>
        <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title" id="pageTitle">概要</div>
        <div class="topbar-meta" id="lastUpdate">読み込み中…</div>
      </div>
      <div class="content-area" id="contentArea" style="position:relative">
        <div class="loading-overlay" id="loadingOverlay">
          <span class="sp"></span>データを読み込み中…
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ══ STUDENT DETAIL MODAL ══ -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ★ Apps Script URL をここに貼り付けてください ★
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const API_URL = '';  // 例: 'https://script.google.com/macros/s/xxx/exec'

let AUTH_PW  = '';
let students = [];
let currentView = 'overview';
let filterTeacher = 'all';
let searchQuery   = '';

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('loginPw').value.trim();
  if (!pw) return;
  if (!API_URL) {
    // Fallback: direct password check (for demo / before API setup)
    document.getElementById('loginErr').textContent = 'API URLが設定されていません。admin.htmlのAPI_URLを設定してください。';
    document.getElementById('loginErr').classList.add('show');
    return;
  }
  try {
    const res = await fetch(`${API_URL}?action=auth&pw=${encodeURIComponent(pw)}`);
    const json = await res.json();
    if (json.ok) {
      AUTH_PW = pw;
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashWrap').style.display  = 'block';
      loadStudents();
    } else {
      document.getElementById('loginErr').classList.add('show');
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'サーバーに接続できません。API URLを確認してください。';
    document.getElementById('loginErr').classList.add('show');
  }
}

function doLogout() {
  AUTH_PW = ''; students = [];
  document.getElementById('dashWrap').style.display  = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadStudents() {
  if (!API_URL) { renderDemoData(); return; }
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const res = await fetch(`${API_URL}?action=students&pw=${encodeURIComponent(AUTH_PW)}`);
    const json = await res.json();
    if (json.error) { alert('データ取得エラー: ' + json.error); return; }
    students = json.students || [];
    document.getElementById('lastUpdate').textContent =
      '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
    renderView(currentView);
  } catch(e) {
    alert('通信エラー: ' + e.message);
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

// Demo data for when API_URL is not yet set
function renderDemoData() {
  students = [
    { '申込日時':'2025/06/01 10:23', 'お名前':'山田 花子', 'メール':'hanako@example.com', '性別':'女性', '年齢':'30代', 'HSK':'なし', 'レベル':'完全初心者', '学習歴':'独学', '強化スキル':'会話力、発音矯正', '学習目的':'中国への旅行を楽しみたい', '理想ゴール':'3ヶ月で日常会話', 'レッスン言語':'中国語メイン、難しいところは日本語で', '学習ペース':'週2回', '担当講師':'Vita先生', '先生への期待':'発音をしっかり直してほしい', 'ステータス':'新規', 'メモ':'' },
    { '申込日時':'2025/06/02 14:45', 'お名前':'田中 太郎', 'メール':'taro@example.com', '性別':'男性', '年齢':'40代', 'HSK':'HSK3級', 'レベル':'仕事で簡単な会話ができる', '学習歴':'オンラインレッスン', '強化スキル':'ビジネス中国語、商談・交渉', '学習目的':'中国のパートナーと直接交渉したい', '理想ゴール':'半年でビジネス会話マスター', 'レッスン言語':'日本語メインで少しずつ中国語を', '学習ペース':'週1回', '担当講師':'Tong先生', '先生への期待':'ビジネス表現を多く教えてほしい', 'ステータス':'連絡済', 'メモ':'来週体験レッスン予定' },
  ];
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('lastUpdate').textContent = 'デモデータ表示中（API URL未設定）';
  renderView(currentView);
}

// ── VIEWS ─────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const titles = { overview:'概要', students:'学生一覧', analysis:'分析' };
  document.getElementById('pageTitle').textContent = titles[view] || view;
  renderView(view);
}

function renderView(view) {
  if (view === 'overview') renderOverview();
  else if (view === 'students') renderStudents();
  else if (view === 'analysis') renderAnalysis();
}

// ── OVERVIEW ──────────────────────────────────────────────────
function renderOverview() {
  const total = students.length;
  const newCount = students.filter(s => s['ステータス'] === '新規').length;
  const vitaCount = students.filter(s => (s['担当講師']||'').includes('Vita')).length;
  const tongCount = students.filter(s => (s['担当講師']||'').includes('Tong')).length;

  document.getElementById('contentArea').innerHTML = `
    <div class="loading-overlay" id="loadingOverlay" style="display:none"><span class="sp"></span>データを読み込み中…</div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">総申込数</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">累計</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.min(total*5,100)}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">新規（未対応）</div>
        <div class="stat-value" style="color:var(--p600)">${newCount}</div>
        <div class="stat-sub">要対応</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${total?Math.round(newCount/total*100):0}%;background:linear-gradient(90deg,var(--err),#f87171)"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Vita 先生希望</div>
        <div class="stat-value">${vitaCount}</div>
        <div class="stat-sub">${total?Math.round(vitaCount/total*100):0}%</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${total?Math.round(vitaCount/total*100):0}%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tong 先生希望</div>
        <div class="stat-value">${tongCount}</div>
        <div class="stat-sub">${total?Math.round(tongCount/total*100):0}%</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${total?Math.round(tongCount/total*100):0}%"></div></div>
      </div>
    </div>

    <div class="section-head"><div class="section-title">最新申込（5件）</div>
      <button style="padding:7px 16px;border:1px solid var(--p200);border-radius:var(--r);font-size:12px;color:var(--p600);background:var(--white);cursor:pointer" onclick="switchNavAndRender('students')">すべて見る →</button>
    </div>
    <div class="student-table">
      <div class="st-head"><span>氏名</span><span>メール</span><span>講師希望</span><span>レベル</span><span>ペース</span><span>申込日時</span><span>ステータス</span></div>
      ${students.slice(0,5).map(s => studentRow(s)).join('')}
      ${students.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--ink3)">申込データがありません</div>' : ''}
    </div>

    <button onclick="loadStudents()" style="padding:9px 20px;border:1px solid var(--p200);border-radius:var(--r);font-size:13px;color:var(--p600);background:var(--white);cursor:pointer">↻ データを更新</button>
  `;
}

function switchNavAndRender(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach((n,i)=>{
    n.classList.toggle('active', ['overview','students','analysis'][i] === view);
  });
  document.getElementById('pageTitle').textContent = {overview:'概要',students:'学生一覧',analysis:'分析'}[view];
  renderView(view);
}

// ── STUDENTS LIST ──────────────────────────────────────────────
function renderStudents() {
  const filtered = filterStudents();
  document.getElementById('contentArea').innerHTML = `
    <div class="loading-overlay" id="loadingOverlay" style="display:none"><span class="sp"></span>データを読み込み中…</div>

    <div class="section-head">
      <div class="filter-row">
        <span class="filter-btn ${filterTeacher==='all'?'active':''}" onclick="setFilter('all',this)">すべて</span>
        <span class="filter-btn ${filterTeacher==='Vita'?'active':''}" onclick="setFilter('Vita',this)">Vita 先生</span>
        <span class="filter-btn ${filterTeacher==='Tong'?'active':''}" onclick="setFilter('Tong',this)">Tong 先生</span>
        <span class="filter-btn ${filterTeacher==='新規'?'active':''}" onclick="setFilter('新規',this)">新規のみ</span>
      </div>
      <input type="text" class="search-box" placeholder="名前・メールで検索" value="${searchQuery}"
             oninput="searchQuery=this.value;renderStudents()">
    </div>

    <div class="student-table">
      <div class="st-head"><span>氏名</span><span>メール</span><span>講師希望</span><span>レベル</span><span>ペース</span><span>申込日時</span><span>ステータス</span></div>
      ${filtered.map(s => studentRow(s)).join('')}
      ${filtered.length===0?'<div style="padding:32px;text-align:center;color:var(--ink3)">条件に一致する学生がいません</div>':''}
    </div>
    <div style="font-size:12px;color:var(--ink3)">${filtered.length} 件表示</div>
  `;
}

function setFilter(val, el) {
  filterTeacher = val;
  renderStudents();
}

function filterStudents() {
  return students.filter(s => {
    const teacher = s['担当講師'] || '';
    const status  = s['ステータス'] || '';
    const name    = s['お名前'] || '';
    const email   = s['メール'] || '';
    const tMatch  = filterTeacher === 'all' ? true
                  : filterTeacher === '新規' ? status === '新規'
                  : teacher.includes(filterTeacher);
    const qMatch  = !searchQuery || name.includes(searchQuery) || email.includes(searchQuery);
    return tMatch && qMatch;
  });
}

function studentRow(s) {
  const statusColors = { '新規':'status-new','連絡済':'status-contacted','体験予定':'status-scheduled','受講中':'status-active' };
  const cls = statusColors[s['ステータス']] || 'status-new';
  return `<div class="st-row" onclick='openModal(${JSON.stringify(s).replace(/'/g,"&apos;")})'>
    <span class="st-name">${s['お名前']||'—'}</span>
    <span class="st-email">${s['メール']||'—'}</span>
    <span>${s['担当講師']||'—'}</span>
    <span style="font-size:12px;color:var(--ink3)">${s['レベル']||'—'}</span>
    <span style="font-size:12px;color:var(--ink3)">${s['学習ペース']||'—'}</span>
    <span style="font-size:12px;color:var(--ink3)">${s['申込日時']||'—'}</span>
    <span><span class="status-badge ${cls}">${s['ステータス']||'新規'}</span></span>
  </div>`;
}

// ── ANALYSIS ──────────────────────────────────────────────────
function renderAnalysis() {
  if (!students.length) {
    document.getElementById('contentArea').innerHTML = '<div style="padding:48px;text-align:center;color:var(--ink3)">データがありません</div>';
    return;
  }
  const count = (arr, key) => arr.reduce((m,s)=>{ const v=s[key]||'不明'; m[v]=(m[v]||0)+1; return m; },{});
  const levelMap  = count(students,'レベル');
  const paceMap   = count(students,'学習ペース');
  const teacherMap= count(students,'担当講師');

  // Skill analysis (multiple values per student)
  const skillCount = {};
  students.forEach(s => {
    (s['強化スキル']||'').split('、').forEach(sk => { if(sk) skillCount[sk]=(skillCount[sk]||0)+1; });
  });

  const renderBar = (map, color='var(--p500)') => {
    const total = Object.values(map).reduce((a,b)=>a+b,0);
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--ink2)">${k}</span>
          <span style="color:var(--ink3)">${v}名 (${Math.round(v/total*100)}%)</span>
        </div>
        <div style="height:6px;border-radius:3px;background:var(--p100);overflow:hidden">
          <div style="height:100%;border-radius:3px;background:${color};width:${Math.round(v/total*100)}%;transition:width .5s"></div>
        </div>
      </div>`).join('');
  };

  document.getElementById('contentArea').innerHTML = `
    <div class="loading-overlay" id="loadingOverlay" style="display:none"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="student-table" style="border-radius:var(--rlg)">
        <div style="padding:16px 20px;border-bottom:1px solid var(--p50)">
          <div class="section-title">レベル分布</div>
        </div>
        <div style="padding:16px 20px">${renderBar(levelMap,'linear-gradient(90deg,var(--p600),var(--p400))')}</div>
      </div>
      <div class="student-table" style="border-radius:var(--rlg)">
        <div style="padding:16px 20px;border-bottom:1px solid var(--p50)">
          <div class="section-title">学習ペース希望</div>
        </div>
        <div style="padding:16px 20px">${renderBar(paceMap,'linear-gradient(90deg,#059669,#34d399)')}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="student-table" style="border-radius:var(--rlg)">
        <div style="padding:16px 20px;border-bottom:1px solid var(--p50)">
          <div class="section-title">講師希望分布</div>
        </div>
        <div style="padding:16px 20px">${renderBar(teacherMap,'linear-gradient(90deg,#d97706,#fbbf24)')}</div>
      </div>
      <div class="student-table" style="border-radius:var(--rlg)">
        <div style="padding:16px 20px;border-bottom:1px solid var(--p50)">
          <div class="section-title">強化スキル人気ランキング</div>
        </div>
        <div style="padding:16px 20px">${renderBar(skillCount,'linear-gradient(90deg,#0891b2,#67e8f9)')}</div>
      </div>
    </div>
  `;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(s) {
  const initials = (s['お名前']||'?').replace(/\s+/g,'').slice(0,2);
  const level    = s['レベル'] || '未記入';
  const pace     = s['学習ペース'] || '未記入';
  const teacher  = s['担当講師'] || '未記入';

  // Simple AI-like analysis based on data
  const urgency  = s['ステータス']==='新規' ? '要対応' : '対応済';
  const courseType = (level.includes('初心者')||level.includes('少し'))
    ? '初心者コース推奨' : level.includes('仕事')||level.includes('ビジネス')
    ? 'ビジネスコース推奨' : '中上級コース推奨';
  const paceRec  = pace.includes('集中') ? '集中コース' : pace.includes('2') ? '週2回プラン' : '週1回プラン';

  document.getElementById('modal').innerHTML = `
    <div class="modal-top">
      <div class="modal-avatar">${initials}</div>
      <div>
        <div class="modal-name">${s['お名前']||'—'}</div>
        <div class="modal-email">${s['メール']||'—'} · ${s['申込日時']||'—'}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="ai-section">
        <div class="ai-title">
          自動分析レポート <span class="ai-tag">✦ AI</span>
        </div>
        <div class="ai-cards">
          <div class="ai-card"><div class="ai-card-icon">🎯</div><div class="ai-card-label">緊急度</div><div class="ai-card-val">${urgency}</div></div>
          <div class="ai-card"><div class="ai-card-icon">📚</div><div class="ai-card-label">推奨コース</div><div class="ai-card-val" style="font-size:11px">${courseType}</div></div>
          <div class="ai-card"><div class="ai-card-icon">⏱</div><div class="ai-card-label">ペースプラン</div><div class="ai-card-val" style="font-size:11px">${paceRec}</div></div>
        </div>
      </div>

      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">性別 / 年齢</div><div class="modal-field-value">${s['性別']||'—'} · ${s['年齢']||'—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">担当講師希望</div><div class="modal-field-value">${teacher}</div></div>
        <div class="modal-field"><div class="modal-field-label">現在のレベル</div><div class="modal-field-value">${level}</div></div>
        <div class="modal-field"><div class="modal-field-label">HSK</div><div class="modal-field-value">${s['HSK']||'—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">学習歴</div><div class="modal-field-value">${s['学習歴']||'—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">希望ペース</div><div class="modal-field-value">${pace}</div></div>
        <div class="modal-field"><div class="modal-field-label">強化スキル</div><div class="modal-field-value">${s['強化スキル']||'—'}</div></div>
        <div class="modal-field"><div class="modal-field-label">レッスン言語</div><div class="modal-field-value">${s['レッスン言語']||'—'}</div></div>
        <div class="modal-field full"><div class="modal-field-label">学習目的</div><div class="modal-field-value">${s['学習目的']||'—'}</div></div>
        <div class="modal-field full"><div class="modal-field-label">理想のゴール</div><div class="modal-field-value">${s['理想ゴール']||'—'}</div></div>
        <div class="modal-field full"><div class="modal-field-label">先生への期待</div><div class="modal-field-value">${s['先生への期待']||'—'}</div></div>
      </div>

      <div class="modal-status-row">
        <span style="font-size:13px;color:var(--ink2);font-weight:500">ステータス：</span>
        <select class="status-select" id="statusSel">
          ${['新規','連絡済','体験予定','受講中','終了'].map(v=>`<option ${s['ステータス']===v?'selected':''}>${v}</option>`).join('')}
        </select>
        <button class="save-status-btn" onclick="alert('ステータス更新機能はGoogle Sheets上で直接編集してください。\\nシートのステータス列を変更後、このページを更新すると反映されます。')">保存</button>
        <a href="mailto:${s['メール']}" style="margin-left:auto;padding:8px 16px;background:var(--p50);border:1px solid var(--p200);border-radius:var(--r);font-size:12px;color:var(--p600);text-decoration:none;transition:all .2s">✉ メールを送る</a>
      </div>
    </div>
  `;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }

// ── INIT ─────────────────────────────────────────────────────
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
if (!API_URL) {
  // Show notice in login card
  document.querySelector('.login-sub').textContent = 'API URL未設定 — デモモードで動作';
}
</script>
</body>
</html>
